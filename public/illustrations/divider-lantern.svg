<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 90" width="600" height="90" fill="none">
  <!-- Left rule line -->
  <line x1="10" y1="58" x2="240" y2="58" stroke="#4A7C59" stroke-width="1" opacity="0.4"/>
  <!-- Left leaf accents -->
  <ellipse cx="228" cy="54" rx="8" ry="3.5" transform="rotate(-20 228 54)" fill="#4A7C59" opacity="0.55"/>
  <ellipse cx="216" cy="56" rx="6" ry="3" transform="rotate(-35 216 56)" fill="#4A7C59" opacity="0.45"/>

  <!-- Hanging chain/hook -->
  <line x1="300" y1="4" x2="300" y2="16" stroke="#7A5230" stroke-width="1.5"/>
  <ellipse cx="300" cy="16" rx="4" ry="3" stroke="#7A5230" stroke-width="1.3" fill="none"/>

  <!-- Lantern top cap -->
  <path d="M284,18 Q300,14 316,18 L314,28 L286,28 Z"
        fill="#7A5230" stroke="#5A3A18" stroke-width="1.2"/>
  <!-- Lantern body frame -->
  <rect x="282" y="28" width="36" height="42" rx="4"
        fill="none" stroke="#7A5230" stroke-width="1.5"/>
  <!-- Warm glow fill -->
  <rect x="283" y="29" width="34" height="40" rx="3"
        fill="#FBBF3A" opacity="0.22"/>
  <!-- Flame -->
  <path d="M300,38 Q304,45 300,52 Q296,45 300,38Z" fill="#F97316" opacity="0.8"/>
  <path d="M300,42 Q303,46 300,51 Q297,46 300,42Z" fill="#FBBF3A" opacity="0.9"/>
  <!-- Lantern bottom -->
  <path d="M286,70 Q300,76 314,70 L314,68 L286,68 Z"
        fill="#7A5230" stroke="#5A3A18" stroke-width="1.2"/>
  <!-- Lantern vertical bars (decorative) -->
  <line x1="292" y1="28" x2="292" y2="70" stroke="#7A5230" stroke-width="0.8" opacity="0.6"/>
  <line x1="308" y1="28" x2="308" y2="70" stroke="#7A5230" stroke-width="0.8" opacity="0.6"/>
  <!-- Horizontal bar -->
  <line x1="282" y1="49" x2="318" y2="49" stroke="#7A5230" stroke-width="0.8" opacity="0.5"/>
  <!-- Glow rays -->
  <line x1="300" y1="28" x2="300" y2="22" stroke="#FBBF3A" stroke-width="1" opacity="0.3"/>
  <line x1="282" y1="49" x2="274" y2="49" stroke="#FBBF3A" stroke-width="1" opacity="0.25"/>
  <line x1="318" y1="49" x2="326" y2="49" stroke="#FBBF3A" stroke-width="1" opacity="0.25"/>

  <!-- Right leaf accents -->
  <ellipse cx="372" cy="54" rx="8" ry="3.5" transform="rotate(20 372 54)" fill="#4A7C59" opacity="0.55"/>
  <ellipse cx="384" cy="56" rx="6" ry="3" transform="rotate(35 384 56)" fill="#4A7C59" opacity="0.45"/>
  <!-- Right rule line -->
  <line x1="360" y1="58" x2="590" y2="58" stroke="#4A7C59" stroke-width="1" opacity="0.4"/>
</svg>
