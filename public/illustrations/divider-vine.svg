<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 60" width="600" height="60" fill="none">
  <!-- Central vine stem -->
  <path d="M50,30 Q150,18 200,30 Q250,42 300,30 Q350,18 400,30 Q450,42 500,30 Q530,24 550,30"
        stroke="#4A7C59" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Left leaf cluster -->
  <ellipse cx="110" cy="22" rx="12" ry="6" transform="rotate(-30 110 22)" fill="#4A7C59" opacity="0.85"/>
  <ellipse cx="130" cy="18" rx="10" ry="5" transform="rotate(-15 130 18)" fill="#5A9A6E" opacity="0.75"/>
  <ellipse cx="90" cy="26" rx="9" ry="4" transform="rotate(-45 90 26)" fill="#3A6248" opacity="0.7"/>

  <!-- Left small berries -->
  <circle cx="160" cy="20" r="3" fill="#C17D3C" opacity="0.9"/>
  <circle cx="168" cy="16" r="2.5" fill="#C17D3C" opacity="0.8"/>
  <circle cx="155" cy="14" r="2" fill="#A8622C" opacity="0.8"/>

  <!-- Center ornament: small crossroads star / fleur -->
  <g transform="translate(300,30)">
    <circle cx="0" cy="0" r="4" fill="#C17D3C"/>
    <path d="M0,-14 C2,-8 2,-6 0,-4 C-2,-6 -2,-8 0,-14Z" fill="#4A7C59"/>
    <path d="M0,14 C2,8 2,6 0,4 C-2,6 -2,8 0,14Z" fill="#4A7C59"/>
    <path d="M-14,0 C-8,2 -6,2 -4,0 C-6,-2 -8,-2 -14,0Z" fill="#4A7C59"/>
    <path d="M14,0 C8,2 6,2 4,0 C6,-2 8,-2 14,0Z" fill="#4A7C59"/>
    <path d="M-9,-9 C-5,-5 -4,-4 -3,-3 C-4,-4 -5,-5 -9,-9Z" stroke="#4A7C59" stroke-width="1.5"/>
    <path d="M9,-9 C5,-5 4,-4 3,-3 C4,-4 5,-5 9,-9Z" stroke="#4A7C59" stroke-width="1.5"/>
    <path d="M-9,9 C-5,5 -4,4 -3,3 C-4,4 -5,5 -9,9Z" stroke="#4A7C59" stroke-width="1.5"/>
    <path d="M9,9 C5,5 4,4 3,3 C4,4 5,5 9,9Z" stroke="#4A7C59" stroke-width="1.5"/>
  </g>

  <!-- Right small berries -->
  <circle cx="432" cy="20" r="3" fill="#C17D3C" opacity="0.9"/>
  <circle cx="440" cy="16" r="2.5" fill="#C17D3C" opacity="0.8"/>
  <circle cx="445" cy="14" r="2" fill="#A8622C" opacity="0.8"/>

  <!-- Right leaf cluster -->
  <ellipse cx="470" cy="22" rx="12" ry="6" transform="rotate(30 470 22)" fill="#4A7C59" opacity="0.85"/>
  <ellipse cx="490" cy="18" rx="10" ry="5" transform="rotate(15 490 18)" fill="#5A9A6E" opacity="0.75"/>
  <ellipse cx="510" cy="26" rx="9" ry="4" transform="rotate(45 510 26)" fill="#3A6248" opacity="0.7"/>

  <!-- Decorative dots flanking center -->
  <circle cx="250" cy="30" r="2" fill="#C17D3C" opacity="0.6"/>
  <circle cx="262" cy="28" r="1.5" fill="#C17D3C" opacity="0.5"/>
  <circle cx="350" cy="30" r="2" fill="#C17D3C" opacity="0.6"/>
  <circle cx="338" cy="28" r="1.5" fill="#C17D3C" opacity="0.5"/>
</svg>
