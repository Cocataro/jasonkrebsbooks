<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 32" width="400" height="32" aria-hidden="true">
  <!-- Central stem -->
  <line x1="140" y1="16" x2="260" y2="16" stroke="#8B6914" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left stem branch -->
  <line x1="140" y1="16" x2="80" y2="16" stroke="#8B6914" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Right stem branch -->
  <line x1="260" y1="16" x2="320" y2="16" stroke="#8B6914" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Center sprig: small rosemary/herb sprigs along the main stem -->
  <line x1="170" y1="16" x2="162" y2="8"  stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="170" y1="16" x2="162" y2="24" stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="185" y1="16" x2="177" y2="8"  stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="185" y1="16" x2="177" y2="24" stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="200" y1="16" x2="192" y2="8"  stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="200" y1="16" x2="192" y2="24" stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="215" y1="16" x2="207" y2="8"  stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="215" y1="16" x2="207" y2="24" stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="230" y1="16" x2="222" y2="8"  stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="230" y1="16" x2="222" y2="24" stroke="#4A6B40" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Tiny leaf tips -->
  <ellipse cx="161" cy="7"  rx="3.5" ry="2" fill="#3E5C35" transform="rotate(-35 161 7)"/>
  <ellipse cx="161" cy="25" rx="3.5" ry="2" fill="#3E5C35" transform="rotate(35 161 25)"/>
  <ellipse cx="176" cy="7"  rx="3.5" ry="2" fill="#4A6B40" transform="rotate(-35 176 7)"/>
  <ellipse cx="176" cy="25" rx="3.5" ry="2" fill="#4A6B40" transform="rotate(35 176 25)"/>
  <ellipse cx="191" cy="7"  rx="3.5" ry="2" fill="#3E5C35" transform="rotate(-35 191 7)"/>
  <ellipse cx="191" cy="25" rx="3.5" ry="2" fill="#3E5C35" transform="rotate(35 191 25)"/>
  <ellipse cx="206" cy="7"  rx="3.5" ry="2" fill="#4A6B40" transform="rotate(-35 206 7)"/>
  <ellipse cx="206" cy="25" rx="3.5" ry="2" fill="#4A6B40" transform="rotate(35 206 25)"/>
  <ellipse cx="221" cy="7"  rx="3.5" ry="2" fill="#3E5C35" transform="rotate(-35 221 7)"/>
  <ellipse cx="221" cy="25" rx="3.5" ry="2" fill="#3E5C35" transform="rotate(35 221 25)"/>

  <!-- Left decorative: small berries on side branches -->
  <line x1="110" y1="16" x2="103" y2="10" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="110" y1="16" x2="103" y2="22" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="102" cy="9"  r="2.5" fill="#A07828"/>
  <circle cx="102" cy="23" r="2.5" fill="#A07828"/>
  <line x1="95"  y1="16" x2="88"  y2="10" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="95"  y1="16" x2="88"  y2="22" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="87" cy="9"  r="2.5" fill="#A07828"/>
  <circle cx="87" cy="23" r="2.5" fill="#A07828"/>

  <!-- Right decorative: mirror -->
  <line x1="290" y1="16" x2="297" y2="10" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="290" y1="16" x2="297" y2="22" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="298" cy="9"  r="2.5" fill="#A07828"/>
  <circle cx="298" cy="23" r="2.5" fill="#A07828"/>
  <line x1="305" y1="16" x2="312" y2="10" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="305" y1="16" x2="312" y2="22" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="313" cy="9"  r="2.5" fill="#A07828"/>
  <circle cx="313" cy="23" r="2.5" fill="#A07828"/>

  <!-- End caps: left and right ruled lines fading -->
  <line x1="0"   y1="16" x2="72" y2="16" stroke="#8B6914" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="328" y1="16" x2="400" y2="16" stroke="#8B6914" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
</svg>
