server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security-ish headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;

    # Long cache for hashed Astro assets
    location ~* ^/_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Short cache for RSS/sitemap
    location = /rss.xml {
        expires 1h;
    }
    location = /sitemap-index.xml {
        expires 1h;
    }

    # Astro generates directory-style routes: /about/index.html
    # Try file → directory (nginx auto-serves index.html) → .html fallback → 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Suppress nginx access log for /health-check requests (if any added later)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
